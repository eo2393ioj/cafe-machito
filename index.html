<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Cafe Machito: cupon digital, menu destacado, historia y contacto por WhatsApp.">
  <title>Cafe Machito - Revancha Oficial</title>

  <style>
    :root {
      --ink: #211814;
      --paper: #fffaf2;
      --white: #ffffff;
      --coffee: #5b372a;
      --coffee-dark: #2d1b16;
      --caramel: #d89b57;
      --mint: #2f8f6b;
      --coral: #e86f4c;
      --shadow: 0 18px 45px rgba(20, 12, 8, 0.24);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--ink);
      background:
        linear-gradient(rgba(22, 13, 10, 0.56), rgba(22, 13, 10, 0.4)),
        url("fondo-cafe.jpg.png") center / cover fixed,
        #3b2a20;
      line-height: 1.6;
    }

    img {
      display: block;
      max-width: 100%;
    }

    a {
      color: inherit;
    }

    .page {
      background: rgba(255, 250, 242, 0.92);
    }

    .nav {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      justify-content: center;
      gap: 8px;
      padding: 12px;
      background: rgba(45, 27, 22, 0.94);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.18);
      backdrop-filter: blur(10px);
    }

    .nav a {
      min-height: 40px;
      padding: 8px 12px;
      border-radius: 8px;
      color: var(--white);
      font-size: 0.95rem;
      font-weight: 700;
      text-decoration: none;
    }

    .nav a:hover,
    .nav a:focus-visible {
      color: var(--coffee-dark);
      background: var(--caramel);
      outline: none;
    }

    .hero {
      min-height: 88vh;
      display: grid;
      align-items: end;
      color: var(--white);
      background:
        linear-gradient(90deg, rgba(25, 16, 12, 0.9), rgba(25, 16, 12, 0.42)),
        url("cafemachito.jpg.png") center / cover;
    }

    .hero__content {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 84px 0 76px;
      text-align: left;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
      padding: 7px 10px;
      border: 1px solid rgba(255, 255, 255, 0.32);
      border-radius: 999px;
      color: #ffe2b9;
      font-size: 0.9rem;
      font-weight: 700;
      background: rgba(0, 0, 0, 0.2);
    }

    .hero h1 {
      max-width: 760px;
      font-size: clamp(2.4rem, 7vw, 5.7rem);
      line-height: 0.98;
      text-shadow: 0 10px 28px rgba(0, 0, 0, 0.36);
    }

    .hero p {
      max-width: 690px;
      margin-top: 20px;
      font-size: clamp(1.05rem, 2.5vw, 1.35rem);
      color: #fff3e2;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 28px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 800;
      text-decoration: none;
      transition: transform 180ms ease, box-shadow 180ms ease, background 180ms ease;
    }

    .btn:hover,
    .btn:focus-visible {
      transform: translateY(-2px);
      outline: none;
    }

    .btn--primary {
      color: var(--white);
      background: var(--mint);
      box-shadow: 0 14px 28px rgba(47, 143, 107, 0.35);
    }

    .btn--primary:focus-visible {
      background: #27775a;
    }
